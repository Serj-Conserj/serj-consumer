<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Входящий звонок</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 100px;
            background-color: #f0f0f0;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 40px;
        }

        #controls {
            display: flex;
            justify-content: center;
            gap: 30px;
        }

        button {
            font-size: 24px;
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        #accept {
            background-color: #4CAF50;
            color: white;
        }

        #decline {
            background-color: #f44336;
            color: white;
        }

        #audio-area {
            margin-top: 50px;
        }
    </style>
</head>

<body>

    <h1>📞 Входящий звонок...</h1>

    <div id="controls">
        <button id="accept">Ответить</button>
        <button id="decline">Отклонить</button>
    </div>

    <div id="audio-area" style="display:none;">
        <h2>🔊 Идёт разговор...</h2>
        <audio id="player" autoplay></audio>
    </div>

    <script>
        let ws;
        document.getElementById('accept').onclick = () => {
            document.getElementById('controls').style.display = 'none';
            document.getElementById('audio-area').style.display = 'block';
            startCall();
        };

        document.getElementById('decline').onclick = () => {
            alert('📴 Звонок отклонён');
            // Можно просто закрыть страницу или показать сообщение
        };

        function startCall() {
            ws = new WebSocket("ws://localhost:8080/ws"); // Здесь меняешь на wss://yourdomain.com/ws

            ws.binaryType = "arraybuffer";

            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const player = document.getElementById('player');
            let source;

            ws.onmessage = async (event) => {
                if (event.data instanceof ArrayBuffer) {
                    const audioData = event.data;
                    const buffer = await audioContext.decodeAudioData(audioData);
                    source = audioContext.createBufferSource();
                    source.buffer = buffer;
                    source.connect(audioContext.destination);
                    source.start();
                }
            };

            ws.onopen = () => {
                console.log('✅ Connected to bot');

                navigator.mediaDevices.getUserMedia({ audio: true }).then((stream) => {
                    const audioContext2 = new AudioContext();
                    const source2 = audioContext2.createMediaStreamSource(stream);
                    const processor = audioContext2.createScriptProcessor(4096, 1, 1);
                    const mediaRecorder = new MediaRecorder(stream);
                    let recording = false;

                    source2.connect(processor);
                    processor.connect(audioContext2.destination);

                    processor.onaudioprocess = (e) => {
                        const input = e.inputBuffer.getChannelData(0);
                        const isSpeaking = input.some(sample => Math.abs(sample) > 0.02);

                        if (isSpeaking && !recording) {
                            console.log('🎙️ Начинаем запись...');
                            mediaRecorder.start();
                            recording = true;
                        } else if (!isSpeaking && recording) {
                            console.log('🛑 Останавливаем запись...');
                            mediaRecorder.stop();
                            recording = false;
                        }
                    };

                    mediaRecorder.addEventListener('dataavailable', async (event) => {
                        if (event.data.size > 0) {
                            const arrayBuffer = await event.data.arrayBuffer();
                            ws.send(arrayBuffer);
                        }
                    });
                });
            };

            ws.onclose = () => {
                console.log('🔴 Disconnected');
                alert('📴 Звонок завершён');
                window.location.reload();
            };
        }
    </script>

</body>


</html>
